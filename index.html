<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>リクラフト・アルケミア 管理ハブ v90.8.172</title>
  <style>
    :root{--bg:#f7f2e8;--card:#fffaf0;--ink:#2d241b;--muted:#7b6a58;--line:#d8c7aa;--accent:#8b5e34;--accent2:#c28b45}
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:"Yu Gothic","Hiragino Sans",system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100svh}
    header{padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(255,250,240,.96);position:sticky;top:0;z-index:10;box-shadow:0 6px 20px rgba(80,50,20,.08)}
    .build{font-size:12px;color:var(--muted);margin-bottom:6px} .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap} .title h1{font-size:clamp(18px,3vw,26px);margin:0 0 4px} .title p{margin:0;color:var(--muted);font-size:12px;line-height:1.5} .tabs{display:flex;gap:8px;flex-wrap:wrap;align-items:center} .tabs button{appearance:none;border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:#fffaf0;color:var(--ink);font-weight:700;cursor:pointer;font-size:13px} .tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-color:transparent}
    main{flex:1;min-height:0;display:flex;flex-direction:column} .notice{padding:8px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:rgba(255,255,255,.45)} .framewrap{flex:1;min-height:0;position:relative} .toolframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:white;display:none} .toolframe.active{display:block} @media(max-width:720px){header{padding:12px}.tabs{width:100%}.tabs button{flex:1;text-align:center}}
  
/* v90.8.172: レイアウト安定化・左揃え・ボタン折返し */
html,body{max-width:100%;overflow-x:hidden}
body,button,input,select,textarea,label,summary,th,td,.tab,.subtab,.tab-btn,.quest-category-btn,.facility-chip,.badge{text-align:left!important}
button,.tab,.subtab,.tab-btn,.quest-category-btn{white-space:normal!important;overflow:visible!important;text-overflow:clip!important;overflow-wrap:anywhere;word-break:normal;line-height:1.35;height:auto;min-width:0;max-width:100%}
.buttons,.tabs,.subtabs,.tab-nav,.quest-category-bar,.section-actions,.filter-actions,.facility-actions,.modal-foot{justify-content:flex-start!important;max-width:100%}
.toolbar,.filter-head,.facility-card-head,.header-inner,.top{max-width:100%;min-width:0}
.field,.card,.panel,.facility-card,.facility-product,.facility-upgrade-box,.tab-panel{min-width:0;max-width:100%}
@media(max-width:760px){
  .buttons,.subtabs,.tab-nav,.quest-category-bar,.section-actions,.filter-actions,.facility-actions,.modal-foot{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;width:100%}
  .buttons>button,.subtabs>button,.tab-nav>button,.quest-category-bar>button,.section-actions>button,.filter-actions>button,.facility-actions>button,.modal-foot>button{width:100%!important;min-width:0!important}
}
@media(max-width:460px){
  .buttons,.subtabs,.tab-nav,.quest-category-bar,.section-actions,.filter-actions,.facility-actions,.modal-foot{grid-template-columns:1fr!important}
}
</style>

<style id="raNoHorizontalScrollV165">
html,body{width:100%;max-width:100%;overflow-x:hidden!important}
main,header,section,.panel,.card,.tabs,.subtabs{min-width:0;max-width:100%}
button,input,select,textarea,label,summary,th,td{min-width:0;max-width:100%;text-align:left!important;white-space:normal!important;overflow-wrap:anywhere;word-break:break-word}
pre,code{max-width:100%;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word}
</style>


<style id="raCompactButtonsV166">
/* v90.8.172: ボタン幅を文字量に合わせる */
button,.tab,.subtab,.tab-btn{
  width:auto!important;
  max-width:100%!important;
  min-width:0!important;
  height:auto!important;
  padding-left:12px;
  padding-right:12px;
  text-align:left!important;
  white-space:normal!important;
  overflow-wrap:anywhere;
  flex:0 1 auto!important;
}
.buttons,.tabs,.subtabs,.actions,.section-actions{
  display:flex!important;
  flex-wrap:wrap!important;
  justify-content:flex-start!important;
  align-items:flex-start!important;
  gap:7px!important;
  max-width:100%;
}
.buttons>button,.tabs>button,.subtabs>button,.actions>button,.section-actions>button{width:auto!important;flex:0 1 auto!important}
</style>

</head>
<body>
  <header>
    <div class="build">Version：v90.8.172 / 最終更新日：2026年7月15日</div>
    <div class="top">
      <div class="title"><h1>リクラフト・アルケミア 管理ハブ</h1><p>DB管理、クエスト・エリア進行管理、ヘルプを切り替えます。</p></div>
      <nav class="tabs" aria-label="管理ツール切替">
        <button type="button" class="active" data-target="database">アイテム・DB管理</button>
        <button type="button" data-target="progress">イベント・進行管理</button>
        <button type="button" data-target="help">ヘルプ</button>
      </nav>
    </div>
  </header>
  <main>
    <div class="notice" id="notice">現在：アイテム・DB管理。</div>
    <div class="framewrap">
      <iframe id="frame-database" class="toolframe active" src="database_admin.html?v=90.8.172" title="アイテム・DB管理"></iframe>
      <iframe id="frame-progress" class="toolframe" src="progress_manager.html?v=90.8.133" title="イベント・進行管理"></iframe>
      <iframe id="frame-help" class="toolframe" src="help.html?v=90.8.133" title="ヘルプ"></iframe>
    </div>
  </main>
  <script>
    const labels={database:'アイテム・DB管理',progress:'イベント・進行管理',help:'ヘルプ'};
    function showTool(key){
      document.querySelectorAll('.tabs button[data-target]').forEach(btn=>btn.classList.toggle('active',btn.dataset.target===key));
      document.querySelectorAll('.toolframe').forEach(frame=>frame.classList.remove('active'));
      const frame=document.getElementById('frame-'+key); if(frame) frame.classList.add('active');
      const notice=document.getElementById('notice'); if(notice) notice.textContent='現在：'+(labels[key]||key)+'。';
      try{history.replaceState(null,'','#'+key);}catch(e){}
    }
    document.querySelectorAll('.tabs button[data-target]').forEach(btn=>btn.addEventListener('click',()=>showTool(btn.dataset.target)));
    const initial=(location.hash||'').replace('#',''); if(labels[initial]) showTool(initial);
  </script>
</body>
</html>
